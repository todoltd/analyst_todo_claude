  document.getElementById('panel').classList.add('on');
}
function cls() {
  document.getElementById('panel').classList.remove('on');
  if (cur) cur.classList.remove('sel'); cur = null;
}
const VIEWS = { 1:{svg:'svg', z:1}, 2:{svg:'svg2', z:1}, 3:{svg:'svg3', z:1}, 4:{svg:'svg4', z:1}, 5:{svg:'svg5', z:1} };
let active = 1;
function showView(n) {
  active = n;
  [1,2,3,4,5].forEach(function(i){
    document.getElementById('view'+i).classList.toggle('on', n === i);
    document.getElementById('tab'+i).classList.toggle('act', n === i);
  });
  var subs = {
    1: 'BPMN 2.0 · повний процес · 🟢 зелена рамка = скіли+інструкції готові',
    2: 'ІНІЦІАЦІЯ · 12 скілів у 3 блоках · клікни картку скіла для деталей',
    3: 'ДИСКАВЕРІ · цикл зустрічей · 2 скіли + опційні кроки · клікни картку для деталей',
    4: 'MVP / БІЛД · 7 скілів у 3 блоках · від затвердженого ТР до перевіреного модуля · клікни картку',
    5: 'ТР · Технічне рішення · 6 скілів tr-* + реєстр «Перелік ТР» · міст дискавері → MVP · клікни картку'
  };
  document.getElementById('sub').textContent = subs[n];
  cls(); apz();
}
function zm(f) { const v = VIEWS[active]; v.z = Math.min(Math.max(v.z * f, 0.2), 3); apz(); }
function zr()  { VIEWS[active].z = 1; apz(); }
function apz() {
  const v = VIEWS[active], s = document.getElementById(v.svg);
  const vb = s.getAttribute('viewBox').split(/\s+/);
  s.style.width  = Math.round(parseFloat(vb[2]) * v.z) + 'px';
  s.style.height = Math.round(parseFloat(vb[3]) * v.z) + 'px';
  document.getElementById('zl').textContent = Math.round(v.z * 100) + '%';
}
showView(1);
</script>
