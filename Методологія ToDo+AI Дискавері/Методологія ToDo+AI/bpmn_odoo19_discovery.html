  "t-research":  { title:"Аналіз інформації + дослідження замовника (Claude)", body:"5 скілів Claude послідовно формують пакет підготовки:\n• sales-handover-analyzer → бриф_[назва_компанії].md (аналіз матеріалів від сейлза)\n• client-web-researcher → дослідження_[назва_компанії].md (сайт, LinkedIn, новини)\n• competitor-mapper → конкуренти_[назва_компанії].md (якщо є час)\n• industry-briefing → галузь_[галузь]_[назва_компанії].md (для нових галузей)\n• discovery-context-builder → підготовка_УЗ_[назва_компанії].md (зведений пакет — завжди останній)\n\n✅ ГОТОВО — 5 скілів написані, провалідовані, зібрані в плагін odoo19-discovery-initiation v0.7.8." },
  "t-prepkof":   { title:"Підготовка до Установчої Зустрічі (Claude)", body:"4 скіли Claude перетворюють підготовка_УЗ на практичні матеріали для зустрічі:\n• kickoff-agenda-finalizer → agenda_[назва_компанії].md (зовнішня версія для замовника + внутрішня для команди)\n• kickoff-question-builder → питання_УЗ_[назва_компанії].md (детальний опитувальник, питання змаповані на входи плану — тільки команда)\n• facilitation-guide-builder → facilitation_[назва_компанії].md (сценарій ведення, репліки, нестандартні ситуації — тільки команда)\n• discovery-charter-writer → charter_[назва_компанії].md (пояснення дискавері для замовника — опційно)\n\n✅ ГОТОВО — 4 скіли написані та провалідовані (плагін v0.7.8)." },
  "t-kickoff":   { title:"Установча Зустріч (з записом)", body:"Перша офіційна зустріч з замовником: знайомство команд, підтвердження цілей проекту, очікування сторін. Записується та транскрибується." },
  "t-analkof":   { title:"Аналіз Установчої Зустрічі → план дискавері (Claude)", body:"3 скіли Claude завершують блок ІНІЦІАЦІЯ:\n• kickoff-transcript-analyzer → аналіз_Установчої Зустрічі_[назва_компанії].md (учасники, підтверджені вимоги, нові ризики, відкриті питання, зміни scope)\n• meeting-protocol-builder → протокол_[тип]_[дата]_[компанія].md + .docx (офіційний документ замовнику, проста мова — крок Humizer)\n• discovery-plan-builder → план_дискавері_[назва_компанії].md (N сесій блоками A/B/C, деталі кожної сесії, deliverables дискавері)\n\n✅ ГОТОВО — 3 скіли написані та провалідовані (плагін v0.7.8)." },
  "t-plan":      { title:"Планування зустрічей (БА)", body:"БА на основі плану дискавері від Claude розподіляє зустрічі по темах, призначає учасників і погоджує розклад." },
  "t-prep":      { title:"Підготовка питань (Claude)", body:"Перед КОЖНОЮ зустріччю циклу — 2 скіли плагіна odoo19-discovery-sessions:\n• session-question-builder → питання_сесії-[N]_[компанія].md — внутрішній опитувальник з пам'яттю циклу: перенесене з минулої зустрічі першим, закрите не перепитує, виключене зі scope не питає. Веде журнал_дискавері_[компанія].md (bootstrap з плану, reconcile з нових протоколів).\n• session-client-prep-builder → спершу робочі .docx на зустріч (питання_сесії-[N].docx + план_дискавері.docx, якщо оновився), потім підготовка_замовника_сесії-[N]_[компанія].md + брендований .docx — лист замовнику: що підготувати, над чим подумати, кого запросити (Humizer + фільтр чутливого).\n\n✅ ГОТОВО — 2 скіли написані, провалідовані, зібрані в плагін odoo19-discovery-sessions v0.1.11." },
  "t-agenda":    { title:"Порядок денний (БА)", body:"БА правит опитувальник сесії (питання_сесії-[N]) своєю експертизою, фіналізує порядок денний і розсилає учасникам. Лист підготовки замовнику генерує session-client-prep-builder — надіслати за 2–3 робочі дні до зустрічі." },
  "t-meeting":   { title:"Зустріч з записом", body:"Тематична зустріч з замовником за узгодженим порядком денним. Записується та автоматично транскрибується (Whisper, Fireflies, Otter тощо)." },
  "t-transcr":   { title:"Аналіз транскрипту (Claude)", body:"Claude аналізує транскрипцію: витягує бізнес-вимоги, болі, рішення, відкриті питання та ключові домовленості." },
  "t-protocol":  { title:"Написання протоколу (Claude)", body:"Claude формує структурований протокол: учасники, порядок денний, вимоги, рішення, action items з відповідальними та термінами.\n\n💡 Тепер покривається універсальним скілом meeting-protocol-builder (плагін ІНІЦІАЦІЯ v0.7.8): протокол на будь-яку зустріч циклу — .md + брендований .docx, крок Humizer." },
  "t-review":    { title:"Review протоколу (БА)", body:"БА перевіряє протокол на точність, додає контекст. Погоджений протокол фіксується в базі знань проекту." },

  const vb = s.getAttribute('viewBox').split(/\s+/);
  s.style.width  = Math.round(parseFloat(vb[2]) * v.z) + 'px';
  s.style.height = Math.round(parseFloat(vb[3]) * v.z) + 'px';
  document.getElementById('zl').textContent = Math.round(v.z * 100) + '%';
}
showView(1);
</script>
</body>
</html>
